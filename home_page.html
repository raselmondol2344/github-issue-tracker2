<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github issue tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />

    <link
      rel="shortcut icon"
      href="assets/github-logo.png"
      type="image/x-icon"
    />
  </head>
<body> 

  <section class="navbar mb-10">
    <div class="navbar bg-base-100 shadow-sm justify-between ">
    <div class="flex items-center gap-3 ">
    <img class="max-h-10  max-w-16 px-2" src="assets/github-logo.png" alt="">
    <h2 class=" md:text-2xl font-bold">GitHub Issues Tracker</h2>
  </div> 
  <div class="flex gap-3 items-center flex-nowrap">
     <!-- <div class="search-div gap-0 md:flex justify-between"> -->
    <input id="searchFild" type="text" placeholder="Search issues... " class="input input-bordered w-40 md:64" />
    <button id="btnSearch" class="btn bg-indigo-800 text-white px-3 md:px-4">Search</button>
    
     <!-- </div> -->
      <div >
         <button class="btn  btn-primary px-3 md:px-4"> <i class="fa-solid fa-plus"></i>New Issue</button>
      </div>
    </div>
  </div>
  </section>


  <section class="w-11/12 mx-auto filter_btn  bg-white shadow-md py-3 space-x-5 px-10 md:justify-center mb-5 ">
    <button onclick="filterIssues('all')" class="btn btn-outline btn-primary w-25">All</button>
    <button onclick="filterIssues('open')"class="btn btn-outline btn-primary w-25" >Open</button>
    <button onclick="filterIssues('closed')"class="btn btn-outline btn-primary w-25" >Closed</button>

  </section>


  <!-- <section class=" bg-white w-11/12  mx-auto h-full py-10 mb-8 rounded-sm shadow-md flex "> -->
    <!-- issue  count section  -->
            <div class="w-11/12 mx-auto py-5 mb-5 shadow-md">

                <div class=" flex items-center justify-between py-4 flex-col sm:flex-row ">
                    <div class="flex gap-3  mb-4 md:mb-0 ">
                        <div class="w-[50px] h-[50px] rounded-full bg-[#ece4ff] flex justify-center items-center">
                            <img src="./assets/Aperture.png" alt="">
                        </div>
                        <div>
                            <h2 class="text-xl font-semibold">
                                <span id="issue-count" class="inline-block">0</span> Issues
                            </h2>
                            <p class="text-gray-500">Track and manage your project issues</p>
                        </div>
                    </div>

                    <!-- open closed section -->
                    <div class="flex gap-3 items-center">
                        <p class="font-semibold"><span
                                class="w-[12px] h-[12px] rounded-full bg-green-500 inline-block"></span> Open</p>
                        <p class="font-semibold"><span
                                class="w-[12px] h-[12px] rounded-full bg-[#a855f7] inline-block"></span> Closed</p>
                    </div>

                </div>

            </div>



  <!-- </section> -->
    
 <section id="all-card" class=" w-11/12 mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 px-2 md:px-6 lg:px-0   ">
   
             <!-- dynamic card loaded -->
  </section>
  

  <!-- modal -->

   <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
<dialog id="show_modal" class="modal">
  <div class="modal-box">
    <div id="modal_Details">
     
      
    </div>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn btn-primary">Close</button>
      </form>
    </div>
  </div>
</dialog>






   
   <script src="script/home.js"></script>
</body> 
</html>
